<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="50%" style="stop-color:#FACC15"/>
      <stop offset="100%" style="stop-color:#EAB308"/>
    </linearGradient>
    <linearGradient id="celebrateBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF4FF"/>
      <stop offset="100%" style="stop-color:#FAE8FF"/>
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#celebrateBg)"/>
  
  <!-- Confetti -->
  <g>
    <rect x="20" y="30" width="8" height="4" fill="#EF4444" transform="rotate(30 24 32)"/>
    <rect x="45" y="20" width="6" height="3" fill="#3B82F6" transform="rotate(-20 48 22)"/>
    <rect x="70" y="35" width="7" height="4" fill="#10B981" transform="rotate(45 74 37)"/>
    <rect x="130" y="25" width="8" height="4" fill="#F59E0B" transform="rotate(-35 134 27)"/>
    <rect x="160" y="40" width="6" height="3" fill="#8B5CF6" transform="rotate(60 163 42)"/>
    <rect x="175" y="60" width="7" height="4" fill="#EC4899" transform="rotate(-15 179 62)"/>
    <rect x="30" y="70" width="5" height="3" fill="#14B8A6" transform="rotate(40 33 72)"/>
    <rect x="15" y="100" width="6" height="4" fill="#F97316" transform="rotate(-50 18 102)"/>
    <rect x="180" y="90" width="8" height="4" fill="#6366F1" transform="rotate(25 184 92)"/>
    <rect x="170" y="130" width="6" height="3" fill="#EF4444" transform="rotate(-30 173 132)"/>
    <circle cx="55" cy="55" r="4" fill="#FDE047"/>
    <circle cx="145" cy="50" r="3" fill="#EC4899"/>
    <circle cx="160" cy="75" r="4" fill="#3B82F6"/>
    <circle cx="35" cy="85" r="3" fill="#10B981"/>
  </g>
  
  <!-- Trophy glow -->
  <ellipse cx="100" cy="100" rx="50" ry="50" fill="#FDE047" opacity="0.3" filter="url(#trophyGlow)"/>
  
  <!-- Trophy cup -->
  <path d="M60 55 Q55 55 55 65 Q55 85 70 95 L70 115 L60 120 L60 130 L140 130 L140 120 L130 115 L130 95 Q145 85 145 65 Q145 55 140 55 Z" 
        fill="url(#trophyGrad)" stroke="#CA8A04" stroke-width="2"/>
  
  <!-- Trophy handles -->
  <path d="M55 65 Q40 65 40 80 Q40 90 55 90" fill="none" stroke="url(#trophyGrad)" stroke-width="8"/>
  <path d="M55 65 Q40 65 40 80 Q40 90 55 90" fill="none" stroke="#CA8A04" stroke-width="2"/>
  <path d="M145 65 Q160 65 160 80 Q160 90 145 90" fill="none" stroke="url(#trophyGrad)" stroke-width="8"/>
  <path d="M145 65 Q160 65 160 80 Q160 90 145 90" fill="none" stroke="#CA8A04" stroke-width="2"/>
  
  <!-- Trophy shine -->
  <path d="M70 60 Q80 55 85 70" fill="none" stroke="#FEF9C3" stroke-width="3" stroke-linecap="round"/>
  
  <!-- #1 on trophy -->
  <text x="100" y="90" font-size="28" font-weight="bold" fill="#92400E" text-anchor="middle" font-family="sans-serif">#1</text>
  
  <!-- Trophy base -->
  <rect x="70" y="130" width="60" height="12" rx="2" fill="#92400E"/>
  <rect x="60" y="142" width="80" height="15" rx="3" fill="#78350F"/>
  <rect x="75" y="148" width="50" height="6" rx="1" fill="#92400E"/>
  
  <!-- Burst lines -->
  <g stroke="#FDE047" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="100" y1="25" x2="100" y2="10"/>
    <line x1="130" y1="35" x2="145" y2="20"/>
    <line x1="70" y1="35" x2="55" y2="20"/>
    <line x1="150" y1="70" x2="170" y2="65"/>
    <line x1="50" y1="70" x2="30" y2="65"/>
  </g>
  
  <!-- Stars -->
  <polygon points="100,170 103,178 111,178 105,183 107,191 100,186 93,191 95,183 89,178 97,178" fill="#EAB308"/>
  <polygon points="35,145 37,150 42,150 38,153 39,158 35,155 31,158 32,153 28,150 33,150" fill="#F59E0B" opacity="0.7"/>
  <polygon points="165,150 167,155 172,155 168,158 169,163 165,160 161,163 162,158 158,155 163,155" fill="#F59E0B" opacity="0.7"/>
</svg>
