<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="timelineShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#fafbfc"/>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">타임라인</text>

  <!-- Main Timeline Line -->
  <line x1="50" y1="100" x2="550" y2="100" stroke="url(#timelineGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Timeline Points -->
  <!-- Point 1 -->
  <circle cx="100" cy="100" r="12" fill="#667eea" filter="url(#timelineShadow)"/>
  <circle cx="100" cy="100" r="6" fill="white"/>
  <text x="100" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">1단계</text>
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">시작</text>
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">2026.01</text>

  <!-- Point 2 -->
  <circle cx="212" cy="100" r="12" fill="#7c5cbf" filter="url(#timelineShadow)"/>
  <circle cx="212" cy="100" r="6" fill="white"/>
  <text x="212" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">2단계</text>
  <text x="212" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">개발</text>
  <text x="212" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">2026.03</text>

  <!-- Point 3 -->
  <circle cx="325" cy="100" r="12" fill="#9b4dca" filter="url(#timelineShadow)"/>
  <circle cx="325" cy="100" r="6" fill="white"/>
  <text x="325" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">3단계</text>
  <text x="325" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">테스트</text>
  <text x="325" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">2026.06</text>

  <!-- Point 4 -->
  <circle cx="437" cy="100" r="12" fill="#c840ab" filter="url(#timelineShadow)"/>
  <circle cx="437" cy="100" r="6" fill="white"/>
  <text x="437" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">4단계</text>
  <text x="437" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">배포</text>
  <text x="437" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">2026.09</text>

  <!-- Point 5 (End) -->
  <circle cx="500" cy="100" r="14" fill="#f093fb" filter="url(#timelineShadow)"/>
  <circle cx="500" cy="100" r="7" fill="white"/>
  <text x="500" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">완료</text>
  <text x="500" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">출시</text>
  <text x="500" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">2026.12</text>

  <!-- Arrow at the end -->
  <polygon points="555,100 545,94 545,106" fill="#f093fb"/>

  <!-- Decorative elements -->
  <rect x="85" y="160" width="30" height="4" rx="2" fill="#667eea" opacity="0.3"/>
  <rect x="197" y="160" width="30" height="4" rx="2" fill="#7c5cbf" opacity="0.3"/>
  <rect x="310" y="160" width="30" height="4" rx="2" fill="#9b4dca" opacity="0.3"/>
  <rect x="422" y="160" width="30" height="4" rx="2" fill="#c840ab" opacity="0.3"/>
  <rect x="485" y="160" width="30" height="4" rx="2" fill="#f093fb" opacity="0.3"/>
</svg>