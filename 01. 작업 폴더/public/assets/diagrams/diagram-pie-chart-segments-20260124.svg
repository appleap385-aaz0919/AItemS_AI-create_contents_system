<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <defs>
    <linearGradient id="slice1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slice2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slice3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slice4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slice5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="pieShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="450" height="350" fill="#f8fafc"/>

  <!-- Title -->
  <text x="225" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">파이 차트 (Pie Chart)</text>

  <!-- Pie Chart - using path arcs -->
  <g transform="translate(180, 180)" filter="url(#pieShadow)">
    <!-- Slice 1: 35% (0 to 126 degrees) - Blue -->
    <path d="M 0 0 L 100 0 A 100 100 0 0 1 30.9 95.1 Z" fill="url(#slice1Grad)" stroke="white" stroke-width="2"/>

    <!-- Slice 2: 25% (126 to 216 degrees) - Green -->
    <path d="M 0 0 L 30.9 95.1 A 100 100 0 0 1 -80.9 58.8 Z" fill="url(#slice2Grad)" stroke="white" stroke-width="2"/>

    <!-- Slice 3: 20% (216 to 288 degrees) - Orange -->
    <path d="M 0 0 L -80.9 58.8 A 100 100 0 0 1 -80.9 -58.8 Z" fill="url(#slice3Grad)" stroke="white" stroke-width="2"/>

    <!-- Slice 4: 12% (288 to 331.2 degrees) - Red -->
    <path d="M 0 0 L -80.9 -58.8 A 100 100 0 0 1 -15.6 -98.8 Z" fill="url(#slice4Grad)" stroke="white" stroke-width="2"/>

    <!-- Slice 5: 8% (331.2 to 360 degrees) - Purple -->
    <path d="M 0 0 L -15.6 -98.8 A 100 100 0 0 1 100 0 Z" fill="url(#slice5Grad)" stroke="white" stroke-width="2"/>

    <!-- Center hole for donut effect -->
    <circle cx="0" cy="0" r="40" fill="#f8fafc"/>

    <!-- Center text -->
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b" font-weight="bold">100%</text>
  </g>

  <!-- Percentage Labels on slices -->
  <text x="235" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">35%</text>
  <text x="145" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">25%</text>
  <text x="115" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">20%</text>
  <text x="145" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">12%</text>
  <text x="200" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">8%</text>

  <!-- Legend -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="url(#slice1Grad)"/>
    <text x="26" y="14" font-family="Arial, sans-serif" font-size="12" fill="#475569">항목 A (35%)</text>

    <rect x="0" y="30" width="18" height="18" rx="3" fill="url(#slice2Grad)"/>
    <text x="26" y="44" font-family="Arial, sans-serif" font-size="12" fill="#475569">항목 B (25%)</text>

    <rect x="0" y="60" width="18" height="18" rx="3" fill="url(#slice3Grad)"/>
    <text x="26" y="74" font-family="Arial, sans-serif" font-size="12" fill="#475569">항목 C (20%)</text>

    <rect x="0" y="90" width="18" height="18" rx="3" fill="url(#slice4Grad)"/>
    <text x="26" y="104" font-family="Arial, sans-serif" font-size="12" fill="#475569">항목 D (12%)</text>

    <rect x="0" y="120" width="18" height="18" rx="3" fill="url(#slice5Grad)"/>
    <text x="26" y="134" font-family="Arial, sans-serif" font-size="12" fill="#475569">항목 E (8%)</text>
  </g>

  <!-- Subtitle -->
  <text x="225" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">데이터 분포 시각화</text>
</svg>