<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#fff"/>
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)" />
  
  <!-- Axes -->
  <!-- Origin at (50, 250) -->
  <line x1="20" y1="250" x2="380" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="50" y1="280" x2="50" y2="20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="270" font-family="sans-serif" font-size="14" fill="#333">x</text>
  <text x="30" y="30" font-family="sans-serif" font-size="14" fill="#333">y</text>
  <text x="35" y="265" font-family="sans-serif" font-size="12" fill="#666">0</text>
  
  <!-- Line: y = 0.6x + 50 (relative to origin) -->
  <!-- At x=0 (50), y=50 (250-50=200) -->
  <!-- At x=300 (350), y=230 (250-230=20) -->
  <line x1="30" y1="212" x2="350" y2="20" stroke="#3B82F6" stroke-width="3" />
  
  <!-- Point and Intercept -->
  <circle cx="50" cy="200" r="4" fill="#EF4444" />
  <text x="65" y="200" font-family="sans-serif" font-size="12" fill="#EF4444">y절편 (b)</text>

  <!-- Slope Triangle -->
  <!-- Point 1: (150, 140)  -->
  <!-- Point 2: (250, 80) -->
  <!-- Run = 100, Rise = 60 -->
  <path d="M150,140 L250,140 L250,80" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="180" y="160" font-family="sans-serif" font-size="12" fill="#10B981">x증가량</text>
  <text x="260" y="115" font-family="sans-serif" font-size="12" fill="#10B981">y증가량</text>
  
  <!-- Equation -->
  <rect x="280" y="200" width="100" height="40" rx="4" fill="#fff" stroke="#3B82F6" stroke-width="1"/>
  <text x="330" y="225" font-family="sans-serif" font-size="14" fill="#3B82F6" text-anchor="middle" font-weight="bold">y = mx + b</text>
</svg>
