<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L9,6 L0,3 z" fill="#333" />
    </marker>
    
    <marker id="arrowEndBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Number Line -->
  <line x1="20" y1="80" x2="380" y2="80" stroke="#333" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  
  <!-- Ticks -->
  <g stroke="#333" stroke-width="2">
    <!-- Center (0) at 150 -->
    <!-- Scale 50px = 1 unit -->
    <!-- -2(50), -1(100), 0(150), 1(200), 2(250), 3(300), 4(350) -->
    <line x1="50" y1="75" x2="50" y2="85" />
    <line x1="100" y1="75" x2="100" y2="85" />
    <line x1="150" y1="75" x2="150" y2="85" />
    <line x1="200" y1="75" x2="200" y2="85" />
    <line x1="250" y1="75" x2="250" y2="85" />
    <line x1="300" y1="75" x2="300" y2="85" />
    <line x1="350" y1="75" x2="350" y2="85" />
  </g>
  
  <!-- Labels -->
  <g font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">
    <text x="50" y="105">-2</text>
    <text x="100" y="105">-1</text>
    <text x="150" y="105">0</text>
    <text x="200" y="105">1</text>
    <text x="250" y="105">2</text>
    <text x="300" y="105">3</text>
    <text x="350" y="105">4</text>
  </g>
  
  <!-- Inequality: x > 2 -->
  <!-- Open circle at 2 (250), arrow to right -->
  <line x1="255" y1="80" x2="370" y2="80" stroke="#3B82F6" stroke-width="4" marker-end="url(#arrowEndBlue)"/>
  <circle cx="250" cy="80" r="5" fill="#fff" stroke="#3B82F6" stroke-width="3" />
  
  <!-- Equation Label -->
  <text x="280" y="50" font-family="sans-serif" font-size="18" fill="#3B82F6" font-weight="bold">x > 2</text>
</svg>
