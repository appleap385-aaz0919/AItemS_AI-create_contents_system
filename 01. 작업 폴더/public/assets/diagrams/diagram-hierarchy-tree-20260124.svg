<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="level2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="treeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="#f8fafc"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">계층 구조</text>

  <!-- Connection Lines -->
  <!-- Root to Level 1 -->
  <line x1="250" y1="95" x2="125" y2="155" stroke="#c7d2fe" stroke-width="3"/>
  <line x1="250" y1="95" x2="250" y2="155" stroke="#c7d2fe" stroke-width="3"/>
  <line x1="250" y1="95" x2="375" y2="155" stroke="#c7d2fe" stroke-width="3"/>

  <!-- Level 1 to Level 2 -->
  <!-- Left branch -->
  <line x1="125" y1="200" x2="75" y2="260" stroke="#ddd6fe" stroke-width="2"/>
  <line x1="125" y1="200" x2="175" y2="260" stroke="#ddd6fe" stroke-width="2"/>

  <!-- Middle branch -->
  <line x1="250" y1="200" x2="220" y2="260" stroke="#ddd6fe" stroke-width="2"/>
  <line x1="250" y1="200" x2="280" y2="260" stroke="#ddd6fe" stroke-width="2"/>

  <!-- Right branch -->
  <line x1="375" y1="200" x2="325" y2="260" stroke="#ddd6fe" stroke-width="2"/>
  <line x1="375" y1="200" x2="425" y2="260" stroke="#ddd6fe" stroke-width="2"/>

  <!-- Root Node (Level 0) -->
  <rect x="190" y="50" width="120" height="45" rx="8" fill="url(#rootGrad)" filter="url(#treeShadow)"/>
  <text x="250" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">최상위</text>

  <!-- Level 1 Nodes -->
  <rect x="65" y="155" width="120" height="45" rx="8" fill="url(#level1Grad)" filter="url(#treeShadow)"/>
  <text x="125" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">부서 A</text>

  <rect x="190" y="155" width="120" height="45" rx="8" fill="url(#level1Grad)" filter="url(#treeShadow)"/>
  <text x="250" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">부서 B</text>

  <rect x="315" y="155" width="120" height="45" rx="8" fill="url(#level1Grad)" filter="url(#treeShadow)"/>
  <text x="375" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">부서 C</text>

  <!-- Level 2 Nodes -->
  <rect x="25" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="75" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 A-1</text>

  <rect x="125" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="175" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 A-2</text>

  <rect x="170" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="220" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 B-1</text>

  <rect x="230" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="280" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 B-2</text>

  <rect x="275" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="325" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 C-1</text>

  <rect x="375" y="260" width="100" height="40" rx="6" fill="url(#level2Grad)" filter="url(#treeShadow)"/>
  <text x="425" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">팀 C-2</text>

  <!-- Legend -->
  <rect x="30" y="340" width="16" height="16" rx="3" fill="url(#rootGrad)"/>
  <text x="52" y="353" font-family="Arial, sans-serif" font-size="11" fill="#64748b">레벨 0 (루트)</text>

  <rect x="140" y="340" width="16" height="16" rx="3" fill="url(#level1Grad)"/>
  <text x="162" y="353" font-family="Arial, sans-serif" font-size="11" fill="#64748b">레벨 1</text>

  <rect x="230" y="340" width="16" height="16" rx="3" fill="url(#level2Grad)"/>
  <text x="252" y="353" font-family="Arial, sans-serif" font-size="11" fill="#64748b">레벨 2</text>

  <!-- Decorative dots -->
  <circle cx="75" y="370" r="3" fill="#e2e8f0"/>
  <circle cx="175" y="370" r="3" fill="#e2e8f0"/>
  <circle cx="220" y="370" r="3" fill="#e2e8f0"/>
  <circle cx="280" y="370" r="3" fill="#e2e8f0"/>
  <circle cx="325" y="370" r="3" fill="#e2e8f0"/>
  <circle cx="425" y="370" r="3" fill="#e2e8f0"/>
</svg>