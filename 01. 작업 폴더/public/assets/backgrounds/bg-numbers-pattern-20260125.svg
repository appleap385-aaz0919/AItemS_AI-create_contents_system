<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="nums" width="80" height="80" patternUnits="userSpaceOnUse">
      <text x="10" y="20" font-family="Courier New, monospace" font-size="18" fill="#ffccbc" opacity="0.7">1</text>
      <text x="50" y="40" font-family="Courier New, monospace" font-size="18" fill="#c8e6c9" opacity="0.7">2</text>
      <text x="20" y="70" font-family="Courier New, monospace" font-size="18" fill="#bbdefb" opacity="0.7">3</text>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <rect width="100%" height="100%" fill="url(#nums)"/>
</svg>
