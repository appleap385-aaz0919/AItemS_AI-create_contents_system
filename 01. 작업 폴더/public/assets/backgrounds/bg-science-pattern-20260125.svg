<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="science" width="150" height="150" patternUnits="userSpaceOnUse">
      <!-- Atom -->
      <g transform="translate(30,30) scale(0.4)">
        <ellipse cx="50" cy="50" rx="40" ry="10" stroke="#b2dfdb" fill="none" stroke-width="2"/>
        <ellipse cx="50" cy="50" rx="40" ry="10" stroke="#b2dfdb" fill="none" stroke-width="2" transform="rotate(60, 50, 50)"/>
        <ellipse cx="50" cy="50" rx="40" ry="10" stroke="#b2dfdb" fill="none" stroke-width="2" transform="rotate(120, 50, 50)"/>
        <circle cx="50" cy="50" r="5" fill="#80cbc4"/>
      </g>
      <!-- Beaker -->
      <g transform="translate(100,80) scale(0.4)">
        <path d="M10,10 L10,40 L40,40 L40,10" stroke="#cfd8dc" fill="none" stroke-width="2"/>
        <path d="M10,30 L40,30" stroke="#cfd8dc" stroke-width="1"/>
      </g>
      <!-- DNA -->
      <g transform="translate(40,100) scale(0.4) rotate(45)">
         <path d="M0,0 Q25,25 50,0 M0,20 Q25,45 50,20" stroke="#ffe0b2" fill="none" stroke-width="2"/>
         <line x1="12" y1="5" x2="12" y2="25" stroke="#ffe0b2" stroke-width="1"/>
         <line x1="38" y1="5" x2="38" y2="25" stroke="#ffe0b2" stroke-width="1"/>
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <rect width="100%" height="100%" fill="url(#science)"/>
</svg>
