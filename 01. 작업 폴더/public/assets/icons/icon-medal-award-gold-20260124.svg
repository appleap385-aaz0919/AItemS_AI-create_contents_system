<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="medalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="50%" style="stop-color:#FACC15"/>
      <stop offset="100%" style="stop-color:#EAB308"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Ribbon left -->
  <polygon points="20,4 28,4 28,30 24,36 20,30" fill="url(#ribbonGrad)"/>
  <polygon points="22,4 26,4 26,28 24,32 22,28" fill="#FCA5A5" opacity="0.3"/>
  <!-- Ribbon right -->
  <polygon points="36,4 44,4 44,30 40,36 36,30" fill="url(#ribbonGrad)"/>
  <polygon points="38,4 42,4 42,28 40,32 38,28" fill="#FCA5A5" opacity="0.3"/>
  <!-- Medal body -->
  <circle cx="32" cy="42" r="18" fill="url(#medalGrad)" stroke="#CA8A04" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="32" cy="42" r="14" fill="none" stroke="#CA8A04" stroke-width="1"/>
  <!-- Star in center -->
  <polygon points="32,30 34,38 42,38 36,43 38,51 32,47 26,51 28,43 22,38 30,38" fill="#FBBF24" stroke="#CA8A04" stroke-width="1"/>
  <!-- Shine -->
  <path d="M22 34 Q26 30 32 32" fill="none" stroke="#FEF9C3" stroke-width="2" stroke-linecap="round"/>
</svg>
