<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="closeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#F87171" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="24" fill="#FEF2F2" stroke="#FECACA" stroke-width="2"/>
  <!-- X lines -->
  <g filter="url(#closeShadow)">
    <line x1="20" y1="20" x2="44" y2="44" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="44" y1="20" x2="20" y2="44" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Highlight -->
  <line x1="22" y1="22" x2="42" y2="42" stroke="#FCA5A5" stroke-width="2" stroke-linecap="round"/>
</svg>
