<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="checklistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
  </defs>
  <!-- Clipboard body -->
  <rect x="10" y="8" width="44" height="52" rx="4" fill="url(#checklistGrad)" stroke="#94A3B8" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="22" y="4" width="20" height="10" rx="2" fill="#64748B"/>
  <rect x="26" y="6" width="12" height="6" rx="1" fill="#CBD5E1"/>
  
  <!-- Checklist items -->
  <!-- Item 1 - Checked -->
  <rect x="16" y="20" width="10" height="10" rx="2" fill="#10B981" stroke="#059669" stroke-width="1"/>
  <polyline points="18,25 21,28 26,22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="30" y="22" width="18" height="4" rx="1" fill="#CBD5E1"/>
  
  <!-- Item 2 - Checked -->
  <rect x="16" y="34" width="10" height="10" rx="2" fill="#10B981" stroke="#059669" stroke-width="1"/>
  <polyline points="18,39 21,42 26,36" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="30" y="36" width="14" height="4" rx="1" fill="#CBD5E1"/>
  
  <!-- Item 3 - Unchecked -->
  <rect x="16" y="48" width="10" height="10" rx="2" fill="white" stroke="#94A3B8" stroke-width="2"/>
  <rect x="30" y="50" width="16" height="4" rx="1" fill="#E2E8F0"/>
</svg>
