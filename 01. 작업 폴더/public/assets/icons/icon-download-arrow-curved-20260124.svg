<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="downloadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="26" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2"/>
  <!-- Arrow body -->
  <rect x="28" y="14" width="8" height="24" rx="2" fill="url(#downloadGrad)"/>
  <!-- Arrow head -->
  <polygon points="32,52 18,36 24,36 24,38 32,46 40,38 40,36 46,36" fill="url(#downloadGrad)"/>
  <!-- Download line -->
  <rect x="16" y="50" width="32" height="4" rx="2" fill="#0891B2"/>
  <!-- Shine effect -->
  <rect x="30" y="16" width="2" height="18" rx="1" fill="#67E8F9" opacity="0.6"/>
</svg>
