<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74EBD5"/>
      <stop offset="100%" style="stop-color:#9FACE6"/>
    </linearGradient>
    <linearGradient id="playBtnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56C596"/>
      <stop offset="100%" style="stop-color:#7BE495"/>
    </linearGradient>
    <filter id="playGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="30" fill="url(#playGrad)" opacity="0.3"/>
  <!-- 메인 원 -->
  <circle cx="32" cy="32" r="26" fill="url(#playGrad)" filter="url(#playGlow)"/>
  <!-- 재생 버튼 삼각형 -->
  <path d="M26 18 L48 32 L26 46 Z" fill="url(#playBtnGrad)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <!-- 삼각형 하이라이트 -->
  <path d="M28 22 L40 32 L28 38 Z" fill="white" opacity="0.3"/>
  <!-- 캐릭터 얼굴 (원 위에) -->
  <!-- 눈 -->
  <ellipse cx="20" cy="28" rx="2.5" ry="3" fill="#5D4E37"/>
  <ellipse cx="44" cy="28" rx="2.5" ry="3" fill="#5D4E37"/>
  <circle cx="21" cy="27" r="1" fill="white"/>
  <circle cx="45" cy="27" r="1" fill="white"/>
  <!-- 볼터치 -->
  <ellipse cx="14" cy="34" rx="4" ry="2.5" fill="#FF9AA2" opacity="0.5"/>
  <ellipse cx="50" cy="34" rx="4" ry="2.5" fill="#FF9AA2" opacity="0.5"/>
  <!-- 작은 미소 -->
  <path d="M16 40 Q20 44 24 40" fill="none" stroke="#5D4E37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 움직임 효과 -->
  <path d="M54 24 L58 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M56 32 L60 32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M54 40 L58 42" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- 반짝이 -->
  <circle cx="10" cy="12" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="52" cy="10" r="2" fill="white" opacity="0.6"/>
  <circle cx="6" cy="22" r="1.5" fill="white" opacity="0.5"/>
  <!-- 별 -->
  <path d="M8 50 L9 52 L11 52 L10 54 L11 56 L8 55 L5 56 L6 54 L5 52 L7 52 Z" fill="#9FACE6"/>
</svg>
