<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="robotBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="robotHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#robotBg)"/>
  
  <!-- Robot shadow -->
  <ellipse cx="100" cy="185" rx="45" ry="10" fill="#94A3B8" opacity="0.3"/>
  
  <!-- Robot body -->
  <rect x="60" y="100" width="80" height="70" rx="15" fill="url(#robotBody)" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Body chest plate -->
  <rect x="75" y="115" width="50" height="40" rx="8" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1"/>
  
  <!-- Heart/core -->
  <circle cx="100" cy="135" r="12" fill="#EF4444" stroke="#DC2626" stroke-width="1"/>
  <path d="M94,132 L100,140 L106,132 Q106,126 100,126 Q94,126 94,132" fill="#F87171"/>
  
  <!-- Robot head -->
  <rect x="65" y="35" width="70" height="60" rx="12" fill="url(#robotHead)" stroke="#3B82F6" stroke-width="2"/>
  
  <!-- Antenna -->
  <rect x="97" y="15" width="6" height="20" fill="#60A5FA"/>
  <circle cx="100" cy="12" r="8" fill="#FDE047" stroke="#EAB308" stroke-width="1"/>
  
  <!-- Eyes -->
  <ellipse cx="82" cy="60" rx="12" ry="14" fill="white" stroke="#3B82F6" stroke-width="1"/>
  <ellipse cx="118" cy="60" rx="12" ry="14" fill="white" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="82" cy="62" r="6" fill="#1E293B"/>
  <circle cx="118" cy="62" r="6" fill="#1E293B"/>
  <circle cx="80" cy="60" r="2" fill="white"/>
  <circle cx="116" cy="60" r="2" fill="white"/>
  
  <!-- Mouth (smile) -->
  <path d="M85 80 Q100 92 115 80" fill="none" stroke="#1E40AF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cheek blush -->
  <ellipse cx="72" cy="72" rx="6" ry="4" fill="#FCA5A5" opacity="0.5"/>
  <ellipse cx="128" cy="72" rx="6" ry="4" fill="#FCA5A5" opacity="0.5"/>
  
  <!-- Arms -->
  <!-- Left arm -->
  <rect x="35" y="110" width="25" height="12" rx="6" fill="url(#robotBody)" stroke="#2563EB" stroke-width="1"/>
  <circle cx="32" cy="116" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="2"/>
  <rect x="25" y="112" width="10" height="8" rx="2" fill="#60A5FA"/>
  
  <!-- Right arm (waving) -->
  <rect x="140" y="95" width="25" height="12" rx="6" fill="url(#robotBody)" stroke="#2563EB" stroke-width="1" transform="rotate(-30 152 101)"/>
  <circle cx="170" cy="85" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="2"/>
  <rect x="165" y="81" width="10" height="8" rx="2" fill="#60A5FA"/>
  
  <!-- Legs -->
  <rect x="72" y="170" width="16" height="20" rx="6" fill="url(#robotBody)" stroke="#2563EB" stroke-width="1"/>
  <rect x="112" y="170" width="16" height="20" rx="6" fill="url(#robotBody)" stroke="#2563EB" stroke-width="1"/>
  <ellipse cx="80" cy="190" rx="10" ry="5" fill="#3B82F6"/>
  <ellipse cx="120" cy="190" rx="10" ry="5" fill="#3B82F6"/>
  
  <!-- Decorative elements -->
  <!-- Sparkles -->
  <g fill="#FDE047">
    <polygon points="40,40 42,45 47,45 43,48 45,53 40,50 35,53 37,48 33,45 38,45"/>
    <polygon points="165,50 166,53 169,53 167,55 168,58 165,56 162,58 163,55 161,53 164,53"/>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(150, 35)">
    <ellipse cx="15" cy="10" rx="22" ry="15" fill="white" stroke="#CBD5E1" stroke-width="1"/>
    <polygon points="5,20 -5,30 10,22" fill="white" stroke="#CBD5E1" stroke-width="1"/>
    <text x="15" y="14" font-size="10" fill="#3B82F6" text-anchor="middle" font-family="sans-serif">안녕!</text>
  </g>
</svg>
