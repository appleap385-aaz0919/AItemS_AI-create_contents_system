<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="labBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFEFF"/>
      <stop offset="100%" style="stop-color:#CFFAFE"/>
    </linearGradient>
    <linearGradient id="scopeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748B"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#labBg)"/>
  
  <!-- Lab table -->
  <rect x="0" y="160" width="200" height="40" fill="#D4A574" stroke="#92400E" stroke-width="2"/>
  
  <!-- Microscope base -->
  <ellipse cx="100" cy="155" rx="40" ry="8" fill="#1E293B"/>
  <rect x="85" y="145" width="30" height="12" rx="2" fill="#334155"/>
  
  <!-- Microscope arm -->
  <rect x="95" y="60" width="10" height="90" fill="url(#scopeBody)" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Microscope head -->
  <path d="M70,35 L85,35 L95,60 L105,60 L115,35 L130,35 L130,55 L120,80 L80,80 L70,55 Z" 
        fill="url(#scopeBody)" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Eyepieces -->
  <rect x="78" y="20" width="12" height="20" rx="2" fill="#475569"/>
  <ellipse cx="84" cy="18" rx="7" ry="3" fill="#334155" stroke="#1E293B" stroke-width="1"/>
  <rect x="110" y="20" width="12" height="20" rx="2" fill="#475569"/>
  <ellipse cx="116" cy="18" rx="7" ry="3" fill="#334155" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Objective lenses -->
  <rect x="88" y="85" width="6" height="15" rx="1" fill="#475569"/>
  <rect x="96" y="90" width="8" height="20" rx="1" fill="#475569"/>
  <rect x="106" y="85" width="6" height="15" rx="1" fill="#475569"/>
  
  <!-- Stage -->
  <rect x="70" y="110" width="60" height="8" rx="2" fill="#334155" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Sample slide -->
  <rect x="85" y="108" width="30" height="4" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1"/>
  <ellipse cx="100" cy="110" rx="8" ry="1.5" fill="#22D3EE"/>
  
  <!-- Focus knobs -->
  <ellipse cx="75" cy="90" rx="6" ry="10" fill="#1E293B" stroke="#0F172A" stroke-width="1"/>
  <ellipse cx="125" cy="90" rx="6" ry="10" fill="#1E293B" stroke="#0F172A" stroke-width="1"/>
  
  <!-- Light source -->
  <rect x="92" y="125" width="16" height="20" rx="2" fill="#475569"/>
  <ellipse cx="100" cy="130" rx="5" ry="3" fill="#FDE047"/>
  
  <!-- Beaker decoration -->
  <g transform="translate(160, 120)">
    <path d="M0,0 L0,30 Q0,40 10,40 L20,40 Q30,40 30,30 L30,0 Z" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <ellipse cx="15" cy="30" rx="10" ry="5" fill="#A78BFA" opacity="0.5"/>
    <path d="M5,35 L10,25 L15,35 L20,20 L25,35" fill="none" stroke="#A78BFA" stroke-width="1"/>
  </g>
  
  <!-- Test tube decoration -->
  <g transform="translate(25, 110)">
    <rect x="0" y="0" width="12" height="40" rx="6" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <ellipse cx="6" cy="35" rx="4" ry="8" fill="#10B981" opacity="0.5"/>
  </g>
  
  <!-- Floating cells/organisms -->
  <g opacity="0.6">
    <circle cx="40" cy="50" r="8" fill="none" stroke="#0EA5E9" stroke-width="1"/>
    <circle cx="40" cy="50" r="3" fill="#0EA5E9"/>
    <circle cx="165" cy="70" r="6" fill="none" stroke="#EC4899" stroke-width="1"/>
    <circle cx="165" cy="70" r="2" fill="#EC4899"/>
    <ellipse cx="55" cy="80" rx="5" ry="8" fill="none" stroke="#10B981" stroke-width="1"/>
    <circle cx="55" cy="78" r="2" fill="#10B981"/>
  </g>
</svg>
