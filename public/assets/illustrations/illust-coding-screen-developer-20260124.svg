<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#codeBg)"/>
  
  <!-- Monitor -->
  <rect x="20" y="20" width="160" height="120" rx="8" fill="#374151" stroke="#4B5563" stroke-width="2"/>
  <rect x="28" y="28" width="144" height="104" rx="2" fill="url(#screenGlow)"/>
  
  <!-- Code lines -->
  <g font-family="monospace" font-size="8">
    <!-- Line numbers -->
    <text x="32" y="42" fill="#64748B">1</text>
    <text x="32" y="52" fill="#64748B">2</text>
    <text x="32" y="62" fill="#64748B">3</text>
    <text x="32" y="72" fill="#64748B">4</text>
    <text x="32" y="82" fill="#64748B">5</text>
    <text x="32" y="92" fill="#64748B">6</text>
    <text x="32" y="102" fill="#64748B">7</text>
    <text x="32" y="112" fill="#64748B">8</text>
    <text x="32" y="122" fill="#64748B">9</text>
    
    <!-- Code content -->
    <text x="44" y="42" fill="#C084FC">function</text>
    <text x="84" y="42" fill="#FDE047">learn</text>
    <text x="108" y="42" fill="white">()</text>
    <text x="118" y="42" fill="white">{</text>
    
    <text x="52" y="52" fill="#C084FC">const</text>
    <text x="78" y="52" fill="#60A5FA">학생</text>
    <text x="115" y="52" fill="white">=</text>
    <text x="123" y="52" fill="#22D3EE">"당신"</text>
    <text x="148" y="52" fill="white">;</text>
    
    <text x="52" y="62" fill="#C084FC">let</text>
    <text x="68" y="62" fill="#60A5FA">스킬</text>
    <text x="98" y="62" fill="white">=</text>
    <text x="106" y="62" fill="#F97316">[]</text>
    <text x="116" y="62" fill="white">;</text>
    
    <text x="52" y="72" fill="white"></text>
    
    <text x="52" y="82" fill="#C084FC">while</text>
    <text x="78" y="82" fill="white">(</text>
    <text x="84" y="82" fill="#60A5FA">학습중</text>
    <text x="122" y="82" fill="white">)</text>
    <text x="128" y="82" fill="white">{</text>
    
    <text x="60" y="92" fill="#60A5FA">스킬</text>
    <text x="90" y="92" fill="white">.</text>
    <text x="94" y="92" fill="#FDE047">push</text>
    <text x="118" y="92" fill="white">(</text>
    <text x="124" y="92" fill="#22D3EE">"지식"</text>
    <text x="148" y="92" fill="white">);</text>
    
    <text x="52" y="102" fill="white">}</text>
    
    <text x="52" y="112" fill="#C084FC">return</text>
    <text x="82" y="112" fill="#10B981">성공</text>
    <text x="120" y="112" fill="white">;</text>
    
    <text x="44" y="122" fill="white">}</text>
  </g>
  
  <!-- Cursor blink -->
  <rect x="130" y="114" width="2" height="10" fill="#FDE047"/>
  
  <!-- Monitor stand -->
  <rect x="85" y="140" width="30" height="15" fill="#374151"/>
  <ellipse cx="100" cy="155" rx="35" ry="6" fill="#4B5563"/>
  
  <!-- Keyboard hint -->
  <rect x="50" y="170" width="100" height="20" rx="3" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <g fill="#1E293B">
    <rect x="55" y="175" width="8" height="5" rx="1"/>
    <rect x="65" y="175" width="8" height="5" rx="1"/>
    <rect x="75" y="175" width="8" height="5" rx="1"/>
    <rect x="85" y="175" width="8" height="5" rx="1"/>
    <rect x="95" y="175" width="8" height="5" rx="1"/>
    <rect x="105" y="175" width="8" height="5" rx="1"/>
    <rect x="115" y="175" width="8" height="5" rx="1"/>
    <rect x="125" y="175" width="8" height="5" rx="1"/>
    <rect x="135" y="175" width="8" height="5" rx="1"/>
    <rect x="62" y="182" width="30" height="4" rx="1"/>
  </g>
  
  <!-- Floating code symbols -->
  <g fill="white" opacity="0.2" font-family="monospace" font-size="16">
    <text x="15" y="50">&lt;/&gt;</text>
    <text x="175" y="80">{}</text>
    <text x="10" y="120">[ ]</text>
    <text x="180" y="140">()</text>
  </g>
</svg>
