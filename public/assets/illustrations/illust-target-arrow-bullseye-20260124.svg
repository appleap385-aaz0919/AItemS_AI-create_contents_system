<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="targetBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#targetBgGrad)"/>
  
  <!-- Target stand -->
  <rect x="95" y="150" width="10" height="40" fill="#78350F"/>
  <rect x="70" y="185" width="60" height="10" rx="2" fill="#92400E"/>
  
  <!-- Target circles -->
  <circle cx="100" cy="100" r="55" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="100" cy="100" r="45" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
  <circle cx="100" cy="100" r="35" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="100" cy="100" r="25" fill="#EF4444" stroke="#DC2626" stroke-width="2"/>
  <circle cx="100" cy="100" r="15" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="100" cy="100" r="6" fill="#FDE047" stroke="#EAB308" stroke-width="2"/>
  
  <!-- Arrow in bullseye -->
  <g transform="translate(100, 100) rotate(-35)">
    <!-- Arrow shaft -->
    <rect x="-60" y="-3" width="65" height="6" rx="1" fill="url(#arrowGrad)"/>
    <!-- Arrow head -->
    <polygon points="5,-6 20,0 5,6" fill="#64748B"/>
    <polygon points="7,-4 16,0 7,4" fill="#94A3B8"/>
    <!-- Arrow fletching -->
    <polygon points="-60,-3 -70,-10 -55,-3" fill="#EF4444"/>
    <polygon points="-60,3 -70,10 -55,3" fill="#EF4444"/>
    <polygon points="-55,-2 -65,-8 -50,-2" fill="#F87171"/>
    <polygon points="-55,2 -65,8 -50,2" fill="#F87171"/>
  </g>
  
  <!-- Impact effect -->
  <g>
    <circle cx="100" cy="100" r="10" fill="none" stroke="#FDE047" stroke-width="2" opacity="0.5"/>
    <circle cx="100" cy="100" r="16" fill="none" stroke="#FDE047" stroke-width="1.5" opacity="0.3"/>
    <circle cx="100" cy="100" r="22" fill="none" stroke="#FDE047" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Sparkles around bullseye -->
  <g fill="#FDE047">
    <polygon points="100,65 102,70 107,70 103,73 104,78 100,75 96,78 97,73 93,70 98,70"/>
    <polygon points="135,100 137,104 141,104 138,107 139,111 135,108 131,111 132,107 129,104 133,104" transform="scale(0.7) translate(55 43)"/>
    <polygon points="65,100 67,104 71,104 68,107 69,111 65,108 61,111 62,107 59,104 63,104" transform="scale(0.7) translate(-30 43)"/>
  </g>
  
  <!-- Motion lines -->
  <g stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="20" y1="130" x2="40" y2="115"/>
    <line x1="15" y1="120" x2="35" y2="110"/>
    <line x1="25" y1="140" x2="45" y2="125"/>
  </g>
  
  <!-- Score badge -->
  <circle cx="165" cy="40" r="22" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <text x="165" y="46" font-size="16" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">100</text>
</svg>
