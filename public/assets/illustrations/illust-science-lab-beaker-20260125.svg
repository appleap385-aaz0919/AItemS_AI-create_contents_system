<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Bubbles -->
  <circle cx="100" cy="100" r="5" fill="#42A5F5" opacity="0.6">
    <animate attributeName="cy" values="100;40" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="120" cy="110" r="3" fill="#42A5F5" opacity="0.6">
    <animate attributeName="cy" values="110;50" dur="2.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Beaker Body -->
  <path d="M70,50 L70,140 Q70,160 90,160 L110,160 Q130,160 130,140 L130,50" fill="#E3F2FD" stroke="#1976D2" stroke-width="4" />
  
  <!-- Beaker Rim -->
  <rect x="65" y="45" width="70" height="5" rx="2" fill="#1976D2" />
  
  <!-- Liquid -->
  <path d="M72,100 L72,140 Q72,158 90,158 L110,158 Q128,158 128,140 L128,100 Q100,110 72,100" fill="#64B5F6" opacity="0.8" />
  
  <!-- Measurement Lines -->
  <line x1="80" y1="130" x2="100" y2="130" stroke="#1976D2" stroke-width="2" />
  <line x1="80" y1="110" x2="95" y2="110" stroke="#1976D2" stroke-width="2" />
  <line x1="80" y1="90" x2="100" y2="90" stroke="#1976D2" stroke-width="2" />
</svg>
