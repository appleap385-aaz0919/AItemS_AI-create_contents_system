<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45a049;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">순서도</text>

  <!-- Start (Rounded Rectangle) -->
  <rect x="140" y="50" width="120" height="50" rx="25" ry="25" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="200" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">시작</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="100" x2="200" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="200,140 195,130 205,130" fill="#666"/>

  <!-- Process 1 (Rectangle) -->
  <rect x="125" y="140" width="150" height="50" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="200" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">처리 1</text>

  <!-- Arrow 2 -->
  <line x1="200" y1="190" x2="200" y2="220" stroke="#666" stroke-width="2"/>
  <polygon points="200,230 195,220 205,220" fill="#666"/>

  <!-- Decision (Diamond) -->
  <polygon points="200,230 280,280 200,330 120,280" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">조건?</text>

  <!-- Yes Arrow -->
  <line x1="200" y1="330" x2="200" y2="360" stroke="#666" stroke-width="2"/>
  <polygon points="200,370 195,360 205,360" fill="#666"/>
  <text x="210" y="355" font-family="Arial, sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">예</text>

  <!-- No Arrow (to the right) -->
  <line x1="280" y1="280" x2="340" y2="280" stroke="#666" stroke-width="2"/>
  <polygon points="350,280 340,275 340,285" fill="#666"/>
  <text x="310" y="270" font-family="Arial, sans-serif" font-size="12" fill="#f44336" font-weight="bold">아니오</text>

  <!-- Process 2 (after Yes) -->
  <rect x="125" y="370" width="150" height="50" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="200" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">처리 2</text>

  <!-- Arrow to End -->
  <line x1="200" y1="420" x2="200" y2="450" stroke="#666" stroke-width="2"/>
  <polygon points="200,460 195,450 205,450" fill="#666"/>

  <!-- End (Rounded Rectangle) -->
  <rect x="140" y="460" width="120" height="35" rx="17" ry="17" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="200" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">종료</text>

  <!-- Side Process (No branch) -->
  <rect x="335" y="255" width="50" height="50" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="360" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">처리</text>

  <!-- Loop back arrow -->
  <path d="M 360 305 L 360 340 L 60 340 L 60 165 L 125 165" fill="none" stroke="#666" stroke-width="2"/>
  <polygon points="125,165 115,160 115,170" fill="#666"/>
</svg>