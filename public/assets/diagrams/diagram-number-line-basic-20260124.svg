<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pointGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="lineShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#faf5ff"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">수직선 (Number Line)</text>

  <!-- Main Number Line -->
  <line x1="30" y1="100" x2="570" y2="100" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" marker-start="url(#arrowLeft)" marker-end="url(#arrowRight)" filter="url(#lineShadow)"/>

  <!-- Tick marks and numbers -->
  <!-- -5 -->
  <line x1="80" y1="90" x2="80" y2="110" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4c1d95" font-weight="bold">-5</text>

  <!-- -4 -->
  <line x1="130" y1="93" x2="130" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="130" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-4</text>

  <!-- -3 -->
  <line x1="180" y1="93" x2="180" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-3</text>

  <!-- -2 -->
  <line x1="230" y1="93" x2="230" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="230" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-2</text>

  <!-- -1 -->
  <line x1="280" y1="93" x2="280" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-1</text>

  <!-- 0 (Origin) -->
  <line x1="330" y1="88" x2="330" y2="112" stroke="#6366f1" stroke-width="3"/>
  <text x="330" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4c1d95" font-weight="bold">0</text>

  <!-- 1 -->
  <line x1="380" y1="93" x2="380" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="380" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">1</text>

  <!-- 2 -->
  <line x1="430" y1="93" x2="430" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">2</text>

  <!-- 3 -->
  <line x1="480" y1="93" x2="480" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">3</text>

  <!-- 4 -->
  <line x1="530" y1="93" x2="530" y2="107" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="530" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">4</text>

  <!-- 5 -->
  <line x1="530" y1="90" x2="530" y2="110" stroke="#8b5cf6" stroke-width="2"/>
  <text x="530" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4c1d95" font-weight="bold">5</text>

  <!-- Example Points -->
  <!-- Point at -2.5 -->
  <circle cx="205" cy="100" r="8" fill="url(#pointGrad)" filter="url(#lineShadow)"/>
  <text x="205" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#db2777" font-weight="bold">-2.5</text>

  <!-- Point at 1.5 -->
  <circle cx="405" cy="100" r="8" fill="url(#pointGrad)" filter="url(#lineShadow)"/>
  <text x="405" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#db2777" font-weight="bold">1.5</text>

  <!-- Interval indicator -->
  <path d="M 205 60 L 205 55 L 405 55 L 405 60" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="305" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#059669" font-weight="bold">거리 = 4</text>

  <!-- Labels -->
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="11" fill="#64748b">음수</text>
  <text x="550" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#64748b">양수</text>

  <!-- Subtitle -->
  <text x="300" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">정수와 실수의 위치 표현</text>
</svg>