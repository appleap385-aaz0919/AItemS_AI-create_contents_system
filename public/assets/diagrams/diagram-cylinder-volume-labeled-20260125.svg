<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Bottom Part -->
  <!-- Hidden part of bottom ellipse -->
  <path d="M70,220 A80,25 0 0,0 230,220" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5" />
  <!-- Visible part of bottom ellipse -->
  <path d="M70,220 A80,25 0 0,1 230,220" fill="none" stroke="#333" stroke-width="2" />
  
  <!-- Body -->
  <path d="M70,80 L70,220 A80,25 0 0,1 230,220 L230,80" fill="#E0F2FE" stroke="none" fill-opacity="0.3"/>
  <line x1="70" y1="80" x2="70" y2="220" stroke="#333" stroke-width="2" />
  <line x1="230" y1="80" x2="230" y2="220" stroke="#333" stroke-width="2" />
  
  <!-- Top Ellipse -->
  <ellipse cx="150" cy="80" rx="80" ry="25" fill="#BAE6FD" stroke="#333" stroke-width="2" />
  
  <!-- Center Point -->
  <circle cx="150" cy="80" r="2" fill="#333" />
  
  <!-- Radius Label -->
  <line x1="150" y1="80" x2="230" y2="80" stroke="#333" stroke-width="1.5" />
  <text x="180" y="70" font-family="sans-serif" font-size="16" fill="#333" font-style="italic">r</text>
  
  <!-- Height Label -->
  <line x1="250" y1="80" x2="250" y2="220" stroke="#333" stroke-width="1.5" marker-start="url(#tick)" marker-end="url(#tick)"/>
  <line x1="245" y1="80" x2="255" y2="80" stroke="#333" stroke-width="1.5"/>
  <line x1="245" y1="220" x2="255" y2="220" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="155" font-family="sans-serif" font-size="16" fill="#333" font-style="italic">h</text>

  <!-- Title -->
  <text x="150" y="280" font-family="sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">원기둥</text>
  <text x="150" y="295" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">V = πr²h</text>
</svg>
