<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branch4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="mindShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" fill="#fdf4ff"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">마인드맵</text>

  <!-- Connection Lines (Curved) -->
  <!-- Branch 1 (Top-Right) - Orange -->
  <path d="M 340 210 Q 420 150 480 100" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <path d="M 480 100 Q 510 80 530 60" fill="none" stroke="#fdba74" stroke-width="2" stroke-linecap="round"/>
  <path d="M 480 100 Q 530 100 560 110" fill="none" stroke="#fdba74" stroke-width="2" stroke-linecap="round"/>

  <!-- Branch 2 (Bottom-Right) - Teal -->
  <path d="M 340 230 Q 420 280 480 340" fill="none" stroke="#14b8a6" stroke-width="4" stroke-linecap="round"/>
  <path d="M 480 340 Q 510 370 530 390" fill="none" stroke="#5eead4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 480 340 Q 530 330 560 320" fill="none" stroke="#5eead4" stroke-width="2" stroke-linecap="round"/>

  <!-- Branch 3 (Bottom-Left) - Purple -->
  <path d="M 260 230 Q 180 280 120 340" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M 120 340 Q 90 370 70 390" fill="none" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  <path d="M 120 340 Q 70 330 40 320" fill="none" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Branch 4 (Top-Left) - Blue -->
  <path d="M 260 210 Q 180 150 120 100" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <path d="M 120 100 Q 90 80 70 60" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <path d="M 120 100 Q 70 100 40 110" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Central Node -->
  <ellipse cx="300" cy="220" rx="65" ry="45" fill="url(#centerGrad)" filter="url(#mindShadow)"/>
  <text x="300" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">핵심</text>
  <text x="300" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">주제</text>

  <!-- Branch 1 Node (Orange) -->
  <ellipse cx="480" cy="100" rx="55" ry="35" fill="url(#branch1Grad)" filter="url(#mindShadow)"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">아이디어 1</text>

  <!-- Branch 1 Sub-nodes -->
  <ellipse cx="540" cy="55" rx="40" ry="22" fill="#fed7aa" filter="url(#mindShadow)"/>
  <text x="540" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412" font-weight="bold">세부 1-1</text>

  <ellipse cx="565" cy="110" rx="40" ry="22" fill="#fed7aa" filter="url(#mindShadow)"/>
  <text x="565" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412" font-weight="bold">세부 1-2</text>

  <!-- Branch 2 Node (Teal) -->
  <ellipse cx="480" cy="340" rx="55" ry="35" fill="url(#branch2Grad)" filter="url(#mindShadow)"/>
  <text x="480" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">아이디어 2</text>

  <!-- Branch 2 Sub-nodes -->
  <ellipse cx="540" cy="395" rx="40" ry="22" fill="#99f6e4" filter="url(#mindShadow)"/>
  <text x="540" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#115e59" font-weight="bold">세부 2-1</text>

  <ellipse cx="565" cy="315" rx="40" ry="22" fill="#99f6e4" filter="url(#mindShadow)"/>
  <text x="565" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#115e59" font-weight="bold">세부 2-2</text>

  <!-- Branch 3 Node (Purple) -->
  <ellipse cx="120" cy="340" rx="55" ry="35" fill="url(#branch3Grad)" filter="url(#mindShadow)"/>
  <text x="120" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">아이디어 3</text>

  <!-- Branch 3 Sub-nodes -->
  <ellipse cx="60" cy="395" rx="40" ry="22" fill="#ddd6fe" filter="url(#mindShadow)"/>
  <text x="60" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5b21b6" font-weight="bold">세부 3-1</text>

  <ellipse cx="35" cy="315" rx="40" ry="22" fill="#ddd6fe" filter="url(#mindShadow)"/>
  <text x="35" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5b21b6" font-weight="bold">세부 3-2</text>

  <!-- Branch 4 Node (Blue) -->
  <ellipse cx="120" cy="100" rx="55" ry="35" fill="url(#branch4Grad)" filter="url(#mindShadow)"/>
  <text x="120" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">아이디어 4</text>

  <!-- Branch 4 Sub-nodes -->
  <ellipse cx="60" cy="55" rx="40" ry="22" fill="#bfdbfe" filter="url(#mindShadow)"/>
  <text x="60" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" font-weight="bold">세부 4-1</text>

  <ellipse cx="35" cy="110" rx="40" ry="22" fill="#bfdbfe" filter="url(#mindShadow)"/>
  <text x="35" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" font-weight="bold">세부 4-2</text>
</svg>