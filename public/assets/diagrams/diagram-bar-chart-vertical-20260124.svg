<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bar1Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar4Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar5Grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">막대 그래프</text>

  <!-- Chart Area Background -->
  <rect x="70" y="50" width="400" height="240" fill="white" rx="8" filter="url(#barShadow)"/>

  <!-- Grid Lines -->
  <line x1="70" y1="98" x2="470" y2="98" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="146" x2="470" y2="146" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="194" x2="470" y2="194" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/>
  <line x1="70" y1="242" x2="470" y2="242" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/>

  <!-- Y-Axis Labels -->
  <text x="60" y="58" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">100</text>
  <text x="60" y="102" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">80</text>
  <text x="60" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">60</text>
  <text x="60" y="198" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">40</text>
  <text x="60" y="246" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">20</text>
  <text x="60" y="294" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0</text>

  <!-- Axis -->
  <line x1="70" y1="290" x2="470" y2="290" stroke="#374151" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="290" stroke="#374151" stroke-width="2"/>

  <!-- Bars -->
  <!-- Bar 1: 85% height = 204px, y = 290 - 204 = 86 -->
  <rect x="100" y="86" width="50" height="204" rx="4" fill="url(#bar1Grad)" filter="url(#barShadow)"/>
  <text x="125" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">85</text>

  <!-- Bar 2: 65% height = 156px, y = 290 - 156 = 134 -->
  <rect x="175" y="134" width="50" height="156" rx="4" fill="url(#bar2Grad)" filter="url(#barShadow)"/>
  <text x="200" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#10b981" font-weight="bold">65</text>

  <!-- Bar 3: 92% height = 221px, y = 290 - 221 = 69 -->
  <rect x="250" y="69" width="50" height="221" rx="4" fill="url(#bar3Grad)" filter="url(#barShadow)"/>
  <text x="275" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">92</text>

  <!-- Bar 4: 45% height = 108px, y = 290 - 108 = 182 -->
  <rect x="325" y="182" width="50" height="108" rx="4" fill="url(#bar4Grad)" filter="url(#barShadow)"/>
  <text x="350" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" font-weight="bold">45</text>

  <!-- Bar 5: 78% height = 187px, y = 290 - 187 = 103 -->
  <rect x="400" y="103" width="50" height="187" rx="4" fill="url(#bar5Grad)" filter="url(#barShadow)"/>
  <text x="425" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" font-weight="bold">78</text>

  <!-- X-Axis Labels -->
  <text x="125" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="bold">1월</text>
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="bold">2월</text>
  <text x="275" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="bold">3월</text>
  <text x="350" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="bold">4월</text>
  <text x="425" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="bold">5월</text>

  <!-- Axis Titles -->
  <text x="270" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">월별 데이터</text>
  <text x="25" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" transform="rotate(-90, 25, 175)">수치</text>
</svg>