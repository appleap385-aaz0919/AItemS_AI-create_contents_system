<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid for Net Construction -->
  <!-- Base: 60x100, Height: 40 -->
  <!-- Let's say center panel is Base (Top) at (100, 100) size 100x60 -->
  
  <!-- Dashed Layout Lines (Folds) -->
  <g fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,4">
    <rect x="100" y="100" width="100" height="60" /> <!-- Top -->
    <rect x="100" y="40" width="100" height="60" /> <!-- Back -->
    <rect x="100" y="160" width="100" height="60" /> <!-- Front -->
    <rect x="100" y="220" width="100" height="60" /> <!-- Bottom -->
    <rect x="40" y="100" width="60" height="60" /> <!-- Left -->
    <rect x="200" y="100" width="60" height="60" /> <!-- Right -->
  </g>
  
  <!-- Solid Outline -->
  <path d="M100,40 L200,40 L200,100 L260,100 L260,160 L200,160 L200,280 L100,280 L100,160 L40,160 L40,100 L100,100 L100,40 Z" fill="#E0F2FE" stroke="#333" stroke-width="2" fill-opacity="0.5"/>
  
  <!-- Labels -->
  <text x="150" y="135" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">밑면</text>
  <text x="150" y="75" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">옆면</text>
  <text x="150" y="195" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">옆면</text>
  <text x="150" y="255" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">밑면</text>
  <text x="70" y="135" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">옆면</text>
  <text x="230" y="135" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">옆면</text>
</svg>
