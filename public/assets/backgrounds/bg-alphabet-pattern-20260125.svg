<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="alpha" width="100" height="100" patternUnits="userSpaceOnUse" viewBox="0 0 100 100">
      <text x="10" y="30" font-family="Arial, sans-serif" font-size="20" fill="#e1bee7" opacity="0.6" font-weight="bold">A</text>
      <text x="60" y="50" font-family="Arial, sans-serif" font-size="20" fill="#c5cae9" opacity="0.6" font-weight="bold">B</text>
      <text x="30" y="80" font-family="Arial, sans-serif" font-size="20" fill="#b2dfdb" opacity="0.6" font-weight="bold">C</text>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#fff9c4" fill-opacity="0.1"/>
  <rect width="100%" height="100%" fill="url(#alpha)"/>
</svg>
