<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified abstract map -->
  <defs>
    <pattern id="map" width="200" height="100" patternUnits="userSpaceOnUse">
      <path d="M20,30 Q40,10 60,30 T100,30 T140,50 T180,30" stroke="#eeeeee" stroke-width="2" fill="none"/>
      <path d="M10,60 Q50,80 90,60 T170,70" stroke="#eeeeee" stroke-width="2" fill="none"/>
      <circle cx="50" cy="50" r="2" fill="#e0e0e0"/>
      <circle cx="120" cy="40" r="2" fill="#e0e0e0"/>
      <circle cx="160" cy="80" r="2" fill="#e0e0e0"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#fcfcfc"/>
  <rect width="100%" height="100%" fill="url(#map)"/>
</svg>
