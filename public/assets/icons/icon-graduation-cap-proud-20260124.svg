<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  <!-- Cap top (mortarboard) -->
  <polygon points="32,8 58,22 32,36 6,22" fill="url(#capGrad)" stroke="#334155" stroke-width="1"/>
  <!-- Top surface highlight -->
  <polygon points="32,10 54,22 32,33 10,22" fill="#334155" opacity="0.5"/>
  <!-- Cap button -->
  <circle cx="32" cy="22" r="4" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  <!-- Tassel string -->
  <path d="M32 22 Q40 26 44 38" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <!-- Tassel -->
  <path d="M44 38 L42 50 L44 52 L46 50 L44 38" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  <!-- Base of cap -->
  <ellipse cx="32" cy="36" rx="16" ry="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
</svg>
