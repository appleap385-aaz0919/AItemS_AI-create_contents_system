<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Clock body -->
  <circle cx="32" cy="32" r="26" fill="#EFF6FF" stroke="url(#clockGrad)" stroke-width="4"/>
  <!-- Hour markers -->
  <g fill="#3B82F6">
    <rect x="30" y="10" width="4" height="6" rx="1"/>
    <rect x="30" y="48" width="4" height="6" rx="1"/>
    <rect x="48" y="30" width="6" height="4" rx="1"/>
    <rect x="10" y="30" width="6" height="4" rx="1"/>
  </g>
  <!-- Clock hands -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#1E40AF" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#1E40AF"/>
  <!-- Timer indicator -->
  <path d="M32 6 A26 26 0 0 1 52 16" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
</svg>
