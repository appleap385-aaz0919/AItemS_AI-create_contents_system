  <circle cx="12" cy="16" r="6" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="52" cy="16" r="6" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="12" cy="48" r="6" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="52" cy="48" r="6" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="32" cy="8" r="5" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="32" cy="56" r="5" fill="#DDD6FE" stroke="#8B5CF6" stroke-width="2"/>
