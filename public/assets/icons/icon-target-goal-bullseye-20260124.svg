<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="#FEE2E2" stroke="url(#targetGrad)" stroke-width="4"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="18" fill="#FECACA" stroke="url(#targetGrad)" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" fill="#FCA5A5" stroke="url(#targetGrad)" stroke-width="4"/>
  <!-- Bullseye -->
  <circle cx="32" cy="32" r="4" fill="#DC2626"/>
  <!-- Arrow -->
  <g>
    <line x1="32" y1="32" x2="50" y2="14" stroke="#1E293B" stroke-width="2"/>
    <polygon points="50,14 44,18 46,20 48,16 52,18" fill="#1E293B"/>
    <!-- Arrow fletching -->
    <line x1="32" y1="32" x2="28" y2="36" stroke="#64748B" stroke-width="2"/>
    <line x1="32" y1="32" x2="36" y2="36" stroke="#64748B" stroke-width="2"/>
  </g>
</svg>
