<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
    <filter id="brainGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <ellipse cx="32" cy="32" rx="22" ry="20" fill="#FDF2F8" filter="url(#brainGlow)"/>
  <!-- Left hemisphere -->
  <path d="M30 12 C16 12 10 24 10 32 C10 44 18 52 30 52 L30 32 C26 32 24 28 24 24 C24 18 28 16 30 16 Z" 
        fill="url(#brainGrad)" stroke="#BE185D" stroke-width="1"/>
  <!-- Right hemisphere -->
  <path d="M34 12 C48 12 54 24 54 32 C54 44 46 52 34 52 L34 32 C38 32 40 28 40 24 C40 18 36 16 34 16 Z" 
        fill="url(#brainGrad)" stroke="#BE185D" stroke-width="1"/>
  <!-- Brain folds -->
  <g stroke="#F9A8D4" stroke-width="1.5" fill="none">
    <path d="M18 26 Q22 28 20 34"/>
    <path d="M46 26 Q42 28 44 34"/>
    <path d="M24 42 Q28 40 30 44"/>
    <path d="M40 42 Q36 40 34 44"/>
  </g>
  <!-- Light sparkles -->
  <circle cx="20" cy="20" r="2" fill="#FDE047"/>
  <circle cx="48" cy="18" r="1.5" fill="#FDE047"/>
  <circle cx="44" cy="44" r="1.5" fill="#FDE047"/>
</svg>
