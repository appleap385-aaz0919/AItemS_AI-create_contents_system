<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="pencilBodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="50%" style="stop-color:#FFC0CB"/>
      <stop offset="100%" style="stop-color:#FFB6C1"/>
    </linearGradient>
    <linearGradient id="pencilWoodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECD2"/>
      <stop offset="100%" style="stop-color:#FCB69F"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <circle cx="32" cy="32" r="30" fill="#FFF0F5" opacity="0.4"/>
  <!-- 연필 본체 -->
  <rect x="14" y="20" width="36" height="16" rx="2" fill="url(#pencilBodyGrad)" transform="rotate(-30 32 32)"/>
  <!-- 연필 나무 부분 -->
  <polygon points="8,48 16,38 22,44" fill="url(#pencilWoodGrad)"/>
  <!-- 연필 심 -->
  <polygon points="8,48 12,44 14,46" fill="#4A4A4A"/>
