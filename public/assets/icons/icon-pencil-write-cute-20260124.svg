  <rect x="42" y="20" width="8" height="16" rx="1" fill="#C0C0C0" transform="rotate(-30 32 32)"/>
  <!-- 지우개 -->
  <rect x="48" y="20" width="10" height="16" rx="3" fill="#FF6B9D" transform="rotate(-30 32 32)"/>
  <!-- 연필 얼굴 -->
  <ellipse cx="32" cy="28" rx="2.5" ry="3" fill="#5D4E37" transform="rotate(-30 32 28)"/>
  <ellipse cx="40" cy="24" rx="2.5" ry="3" fill="#5D4E37" transform="rotate(-30 40 24)"/>
  <circle cx="33" cy="27" r="1" fill="white"/>
  <circle cx="41" cy="23" r="1" fill="white"/>
  <!-- 미소 -->
  <path d="M34 33 Q38 37 42 31" fill="none" stroke="#5D4E37" stroke-width="2" stroke-linecap="round"/>
  <!-- 볼터치 -->
  <ellipse cx="28" cy="34" rx="3" ry="2" fill="#FF9AA2" opacity="0.6" transform="rotate(-30 28 34)"/>
  <ellipse cx="46" cy="28" rx="3" ry="2" fill="#FF9AA2" opacity="0.6" transform="rotate(-30 46 28)"/>
  <!-- 쓰기 효과 -->
  <path d="M6 54 Q12 50 18 54 Q24 58 30 54" fill="none" stroke="#FFB6C1" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- 반짝이 -->
  <circle cx="54" cy="10" r="2" fill="#FFB6C1"/>
  <circle cx="58" cy="18" r="1.5" fill="#FFB6C1"/>
  <circle cx="50" cy="6" r="1.5" fill="#FFB6C1"/>
