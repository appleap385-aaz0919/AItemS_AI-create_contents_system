<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 빛나는 효과 -->
  <circle cx="32" cy="32" r="30" fill="#FFF9E6" opacity="0.5"/>
  <!-- 메인 별 -->
  <path d="M32 6 L38 24 L56 24 L42 36 L48 54 L32 44 L16 54 L22 36 L8 24 L26 24 Z"
        fill="url(#starGrad)" filter="url(#starGlow)" stroke="#FFB347" stroke-width="1"/>
  <!-- 별 눈 -->
  <ellipse cx="26" cy="28" rx="3" ry="4" fill="#5D4E37"/>
  <ellipse cx="38" cy="28" rx="3" ry="4" fill="#5D4E37"/>
  <!-- 눈 하이라이트 -->
  <circle cx="27" cy="27" r="1.5" fill="white"/>
  <circle cx="39" cy="27" r="1.5" fill="white"/>
  <!-- 미소 -->
  <path d="M26 36 Q32 42 38 36" fill="none" stroke="#5D4E37" stroke-width="2" stroke-linecap="round"/>
  <!-- 볼터치 -->
  <ellipse cx="20" cy="34" rx="4" ry="2.5" fill="#FF9AA2" opacity="0.6"/>
  <ellipse cx="44" cy="34" rx="4" ry="2.5" fill="#FF9AA2" opacity="0.6"/>
  <!-- 반짝이 -->
  <circle cx="50" cy="12" r="2" fill="#FFE066"/>
  <circle cx="12" cy="16" r="1.5" fill="#FFE066"/>
  <circle cx="54" cy="44" r="1.5" fill="#FFE066"/>
</svg>
